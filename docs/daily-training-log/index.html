<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Training Log | Takeshi Chang</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2b;
      --text: #e8edf7;
      --muted: #a8b3c7;
      --accent: #7aa2ff;
      --border: #24314d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    h1 {
      margin: 0 0 12px;
      line-height: 1.2;
      font-size: 2.4rem;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .back {
      display: inline-block;
      margin-bottom: 28px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .panel {
      margin-top: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .panel a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="../">← Back to home</a>

    <h1>Daily Training Log</h1>
    <p>
      Ongoing notes on what I’m studying, building, and improving over time.
    </p>

    <div class="panel">
      <p>
        This section will track daily progress across probability, modeling, coding,
        and quant preparation.
      </p>
      <p>
        For now, the source files live in the GitHub repository:
        <a href="https://github.com/Takeshi-Chang/QT-Training-Camp/tree/main/daily-training-log">
          View training log folder
        </a>
      </p>
    </div>
  </div>
</body>
</html>
